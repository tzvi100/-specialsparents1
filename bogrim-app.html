<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#4A1D7E" />
<title>בודק זכאות לבוגרים עם נכות · הורה ומיוחד · מימושים</title>
<meta name="description" content="בדיקה חכמה לבוגרים עם נכות (18+): נכות כללית, שירותים מיוחדים, ניידות, תאונות עבודה, הטבות. סכומים עדכניים ל-2026." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
  :root{
    --brand-purple:#4A1D7E; --brand-purple-deep:#3A1463; --brand-purple-light:#A78EC9;
    --brand-purple-soft:#EDE5F5; --brand-teal:#2EAFB8; --brand-teal-soft:#D4EFF1;
    --brand-orange:#F26B4F; --brand-orange-soft:#FCE0D9; --brand-yellow:#F5C536;
    --brand-yellow-soft:#FCF1CC; --green:#2D8F5F; --green-soft:#D8EDE0;
    --ink:#1A1230; --ink-soft:#4A3D5C; --bg:#FAFAFA; --bg-2:#F4F0F8;
    --white:#FFFFFF; --line:rgba(74,29,126,.12);
    --shadow-lg:0 30px 60px -30px rgba(74,29,126,.4);
    --shadow-md:0 14px 32px -16px rgba(74,29,126,.3);
    --shadow-sm:0 6px 16px -8px rgba(74,29,126,.22);
    --radius-lg:24px; --radius-md:16px; --radius-sm:12px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Heebo',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
  .container{width:100%;max-width:780px;margin:0 auto;padding-inline:clamp(16px,4vw,32px);}
  .app-header{background:var(--brand-purple);color:#fff;padding:14px 0;position:sticky;top:0;z-index:30;box-shadow:0 2px 12px rgba(74,29,126,.15);}
  .app-header-inner{display:flex;align-items:center;justify-content:space-between;gap:14px}
  .back-btn{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;display:grid;place-items:center;font-size:1.2rem;flex-shrink:0;transition:transform .25s ease,background .25s;}
  .back-btn:hover{transform:translateX(3px);background:rgba(255,255,255,.25)}
  .app-title{font-family:'Rubik',sans-serif;font-weight:800;font-size:clamp(1rem,2.5vw,1.15rem);text-align:center;flex:1;color:#fff;}
  .app-title span{display:block;font-family:'Heebo';font-size:.7rem;font-weight:500;color:var(--brand-yellow);letter-spacing:.1em;margin-top:2px}
  main{flex:1;padding:clamp(24px,5vw,48px) 0}
  .progress-wrap{margin-bottom:32px}
  .progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:.85rem;font-weight:600;}
  .progress-info .step-num{color:var(--brand-purple)}
  .progress-info .step-percent{color:var(--ink-soft)}
  .progress-bar{height:8px;background:var(--brand-purple-soft);border-radius:999px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--brand-yellow),var(--brand-orange));border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px rgba(242,107,79,.4);}
  .card{background:var(--white);border-radius:var(--radius-lg);padding:clamp(24px,4vw,40px);box-shadow:var(--shadow-sm);animation:slideIn .4s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .question-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:var(--brand-purple-soft);font-size:.78rem;letter-spacing:.08em;color:var(--brand-purple);font-weight:700;margin-bottom:18px;text-transform:uppercase;}
  .question-eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--brand-orange)}
  .question-title{font-family:'Rubik',sans-serif;font-weight:800;font-size:clamp(1.5rem,4vw,2.1rem);line-height:1.15;margin-bottom:12px;color:var(--brand-purple);}
  .question-help{color:var(--ink-soft);font-size:1rem;margin-bottom:28px;}
  .options{display:grid;gap:12px;margin-bottom:24px}
  .option{display:flex;align-items:center;gap:14px;padding:18px 20px;background:var(--bg);border:2px solid var(--line);border-radius:var(--radius-md);text-align:right;width:100%;font-size:1rem;font-weight:500;color:var(--ink);transition:all .25s ease;min-height:64px;}
  .option:hover{border-color:var(--brand-purple-light);background:#fff;transform:translateX(-3px)}
  .option.selected{border-color:var(--brand-orange);background:#fff;box-shadow:0 0 0 3px rgba(242,107,79,.15);}
  .option .check{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;transition:all .25s ease;}
  .option.selected .check{background:var(--brand-orange);border-color:var(--brand-orange);}
  .option.selected .check::after{content:"✓";color:#fff;font-weight:900;font-size:.9rem;}
  .option .opt-icon{font-size:1.4rem;flex-shrink:0}
  .option .opt-label{flex:1}
  .option .opt-label strong{display:block;font-weight:700}
  .option .opt-label span{display:block;font-size:.82rem;color:var(--ink-soft);font-weight:400;margin-top:2px}
  .age-input{display:flex;align-items:center;justify-content:center;gap:14px;margin:30px 0 24px;}
  .age-btn{width:54px;height:54px;border-radius:50%;background:var(--brand-purple-soft);color:var(--brand-purple);font-size:1.5rem;font-weight:700;transition:all .2s ease;}
  .age-btn:hover{background:var(--brand-purple);color:#fff;transform:scale(1.05)}
  .age-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .age-display{font-family:'Rubik',sans-serif;font-weight:900;font-size:clamp(2.5rem,8vw,4rem);color:var(--brand-purple);min-width:120px;text-align:center;line-height:1;}
  .age-display small{font-size:.4em;display:block;color:var(--ink-soft);font-family:'Heebo';font-weight:500;margin-top:6px}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 28px;border-radius:999px;font-weight:700;font-size:.95rem;transition:all .25s ease;white-space:nowrap;min-height:52px;flex:1;}
  .btn-primary{background:var(--brand-purple);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);background:var(--brand-purple-deep)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-ghost{background:transparent;color:var(--brand-purple);border:2px solid var(--brand-purple);flex:0 0 auto;min-width:120px}
  .btn-ghost:hover{background:var(--brand-purple);color:#fff}
  .btn:active{transform:scale(.97)}
  .results-header{text-align:center;margin-bottom:32px}
  .results-badge{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;border-radius:999px;background:var(--green);color:#fff;font-weight:700;font-size:.9rem;box-shadow:var(--shadow-sm);margin-bottom:18px;}
  .results-badge::before{content:"✓";font-size:1.1rem}
  .results-title{font-family:'Rubik',sans-serif;font-weight:900;font-size:clamp(1.8rem,5vw,2.6rem);line-height:1.1;margin-bottom:12px;color:var(--brand-purple);}
  .results-title em{font-style:normal;color:var(--brand-orange)}
  .results-sub{color:var(--ink-soft);font-size:1.05rem;max-width:520px;margin:0 auto}
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:30px;}
  .summary-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-md);padding:18px 16px;text-align:center;}
  .summary-card.high{border-top:4px solid var(--green)}
  .summary-card.medium{border-top:4px solid var(--brand-yellow)}
  .summary-card.low{border-top:4px solid var(--brand-purple-light)}
  .summary-card strong{display:block;font-family:'Rubik',sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:900;color:var(--brand-purple);line-height:1;}
  .summary-card span{font-size:.82rem;color:var(--ink-soft);display:block;margin-top:4px;font-weight:600}
  .results-list{display:grid;gap:14px;margin-bottom:32px}
  .result-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-md);padding:22px;transition:all .3s ease;border-right:5px solid var(--brand-yellow);}
  .result-card.high{border-right-color:var(--green)}
  .result-card.medium{border-right-color:var(--brand-yellow)}
  .result-card.low{border-right-color:var(--brand-purple-light);opacity:.85}
  .result-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
  .result-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
  .result-icon{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;font-size:1.4rem;flex-shrink:0;color:#fff;}
  .result-card.high .result-icon{background:var(--green)}
  .result-card.medium .result-icon{background:var(--brand-yellow);color:var(--ink)}
  .result-card.low .result-icon{background:var(--brand-purple-light)}
  .result-info{flex:1;min-width:0}
  .result-info h3{font-family:'Rubik',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:4px;color:var(--ink);}
  .result-likelihood{display:inline-block;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:.04em;}
  .likelihood-high{background:var(--green-soft);color:var(--green)}
  .likelihood-medium{background:var(--brand-yellow-soft);color:#7a5520}
  .likelihood-low{background:var(--brand-purple-soft);color:var(--brand-purple)}
  .result-amount{display:inline-block;background:var(--brand-purple);color:#fff;padding:6px 14px;border-radius:8px;font-family:'Rubik',sans-serif;font-weight:700;font-size:.92rem;margin-top:8px;}
  .result-card.high .result-amount{background:var(--green)}
  .result-amount small{font-size:.7em;font-weight:500;opacity:.85}
  .result-desc{color:var(--ink-soft);font-size:.92rem;margin-bottom:14px;margin-top:8px}
  .result-steps{background:var(--bg);border-radius:var(--radius-sm);padding:14px 16px;}
  .result-steps strong{display:block;font-size:.78rem;letter-spacing:.06em;color:var(--brand-purple);font-weight:700;margin-bottom:8px;text-transform:uppercase;}
  .result-steps ul{list-style:none;display:grid;gap:6px}
  .result-steps li{font-size:.88rem;display:flex;gap:8px;align-items:flex-start;color:var(--ink-soft);}
  .result-steps li::before{content:"→";color:var(--brand-orange);font-weight:900;flex-shrink:0;}
  .cta-block{background:linear-gradient(135deg,var(--brand-purple),var(--brand-purple-deep));color:#fff;border-radius:var(--radius-lg);padding:clamp(28px,4vw,40px);text-align:center;position:relative;overflow:hidden;}
  .cta-block::before{content:"";position:absolute;top:-50%;right:-30%;width:80%;height:200%;background:radial-gradient(circle,rgba(245,197,54,.2),transparent 60%);pointer-events:none;}
  .cta-block h3{font-family:'Rubik',sans-serif;font-weight:900;font-size:clamp(1.3rem,3.5vw,1.8rem);margin-bottom:10px;position:relative;color:#fff;}
  .cta-block p{color:rgba(255,255,255,.85);margin-bottom:20px;position:relative;font-size:.95rem}
  .cta-block .actions{position:relative;justify-content:center}
  .cta-block .btn-primary{background:var(--brand-yellow);color:var(--ink)}
  .cta-block .btn-primary:hover{background:#fff}
  .cta-block .btn-ghost{color:#fff;border-color:rgba(255,255,255,.4)}
  .cta-block .btn-ghost:hover{background:#fff;color:var(--brand-purple)}
  .disclaimer{text-align:center;margin-top:24px;padding:14px;color:var(--ink-soft);font-size:.78rem;background:var(--brand-purple-soft);border-radius:var(--radius-sm);line-height:1.5;}
  .intro-banner{background:linear-gradient(135deg,var(--brand-purple-soft),var(--brand-teal-soft));border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:24px;border-right:5px solid var(--brand-orange);}
  .intro-banner h2{font-family:'Rubik',sans-serif;font-weight:800;color:var(--brand-purple);font-size:1.05rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .intro-banner p{color:var(--ink-soft);font-size:.88rem;margin-bottom:12px}
  .intro-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .intro-cat{background:#fff;border-radius:var(--radius-sm);padding:10px 12px;font-size:.82rem;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px;border:1px solid var(--line);}
  .intro-cat .ic-emoji{font-size:1.1rem;flex-shrink:0}
  @media (max-width:480px){.intro-cats{grid-template-columns:1fr}}
  .cat-section{margin-bottom:24px}
  .cat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;border-radius:var(--radius-md);background:var(--brand-purple-soft);border-right:4px solid var(--brand-purple);}
  .cat-header.cat-disability{background:#FCE7E1;border-right-color:var(--brand-orange)}
  .cat-header.cat-shamam{background:var(--brand-teal-soft);border-right-color:var(--brand-teal)}
  .cat-header.cat-mobility{background:var(--brand-yellow-soft);border-right-color:var(--brand-yellow)}
  .cat-header.cat-benefits{background:var(--brand-purple-soft);border-right-color:var(--brand-purple)}
  .cat-header .ch-icon{font-size:1.3rem}
  .cat-header .ch-title{font-family:'Rubik',sans-serif;font-weight:800;color:var(--ink);font-size:.98rem;flex:1}
  .cat-header .ch-count{font-size:.78rem;color:var(--ink-soft);font-weight:700;background:#fff;padding:3px 10px;border-radius:999px}
  @media (min-width:640px){.summary{grid-template-columns:repeat(3,1fr)}.options.cols-2{grid-template-columns:1fr 1fr}.actions{flex-wrap:nowrap}}
  @media (min-width:900px){.container{max-width:840px}.age-btn{width:60px;height:60px}}
  @media (max-width:480px){.options.cols-2{grid-template-columns:1fr}.btn-ghost{min-width:auto;padding:14px 20px}.actions{gap:8px}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  /* Lead form */
  .lead-form{background:rgba(255,255,255,.08);border-radius:var(--radius-md);padding:18px;margin-bottom:18px;text-align:right;position:relative}
  .lead-form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  @media (max-width:480px){.lead-form-row{grid-template-columns:1fr}}
  .lead-form input[type=text],.lead-form input[type=tel],.lead-form input[type=email]{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.95);color:var(--ink);font-family:inherit;font-size:.95rem}
  .lead-form input:focus{outline:2px solid var(--brand-yellow);outline-offset:2px}
  .lead-form label.cb{display:flex;align-items:flex-start;gap:8px;font-size:.82rem;color:rgba(255,255,255,.92);margin-top:10px;line-height:1.5;cursor:pointer}
  .lead-form input[type=checkbox]{margin-top:3px;width:18px;height:18px;flex-shrink:0}
  .lead-form label.cb a{color:var(--brand-yellow);text-decoration:underline}
  .disclaimer-full{text-align:right;padding:18px;background:#FFF5E1;border:1px solid #F5C536;border-radius:var(--radius-md);font-size:.78rem;line-height:1.7;color:var(--ink-soft);margin-top:18px}
  .disclaimer-full strong{color:var(--brand-orange);display:block;margin-bottom:6px;font-size:.88rem}
  /* CTA: 2 כפתורי-על שווי-רוחב + "בדוק שוב" קטן ממורכז */
  .cta-block .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;position:relative}
  .cta-block .actions .btn{width:100%;text-align:center;font-size:.95rem;padding:16px 22px;line-height:1.3;white-space:normal}
  .cta-block .actions .btn-ghost{grid-column:1 / -1;justify-self:center;min-width:180px;max-width:260px;width:auto;font-size:.85rem;padding:10px 24px;margin-top:4px}
  @media (max-width:640px){
    .cta-block .actions{grid-template-columns:1fr;gap:10px}
    .cta-block .actions .btn-ghost{grid-column:auto;width:100%;max-width:none}
  }
  .cta-block .disclaimer{background:transparent;color:rgba(255,255,255,.85);margin-top:16px;padding:8px 0;border-radius:0;font-size:.78rem}
  .cta-block .disclaimer a{color:var(--brand-yellow);text-decoration:underline}
  .cta-block .disclaimer strong{color:#fff}
</style>
</head>
<body>

<header class="app-header">
  <div class="container app-header-inner">
    <a href="router.html" class="back-btn" aria-label="חזור">→</a>
    <div class="app-title">
      בודק זכאות לבוגרים עם נכות
      <span>הורה ומיוחד · מימושים · 2026</span>
    </div>
    <div style="width:42px"></div>
  </div>
</header>

<main>
  <div class="container">
    <div id="app"></div>
  </div>
</main>

<script>
  // ============================================
  // בודק זכאות לבוגרים (18+)
  // נתוני 2026 · מבוסס על אתר ביטוח לאומי
  // ============================================
  const QUESTIONS = [
    {
      id:'disability',
      eyebrow:'שלב 1',
      title:'מה סוג הלקות העיקרית?',
      help:'בחר את הקטגוריה הקרובה ביותר. בהמשך נחדד.',
      type:'select',
      cols:2,
      options:[
        {v:'physical', icon:'♿', label:'לקות פיזית / מוטורית', desc:'שיתוק, ניוון שרירים, נכות פיזית, פגיעת עמוד שדרה'},
        {v:'developmental', icon:'🧩', label:'לקות התפתחותית / שכלית', desc:'אוטיזם, מוגבלות שכלית, תסמונת דאון'},
        {v:'sensory', icon:'👁️', label:'לקות חושית', desc:'עיוורון, חירשות, ליקוי שמיעה / ראייה'},
        {v:'medical', icon:'🏥', label:'מצב רפואי כרוני', desc:'סוכרת, אפילפסיה, סרטן, דיאליזה, מחלות לב'},
        {v:'mental', icon:'💭', label:'מצב נפשי', desc:'הפרעות נפשיות מאובחנות, סכיזופרניה, דיכאון קשה'},
        {v:'multiple', icon:'➕', label:'לקויות משולבות', desc:'יותר מסוג לקות, תסמונת נדירה'},
      ]
    },
    {
      id:'age',
      eyebrow:'שלב 2',
      title:'בן כמה אתה / היא?',
      help:'הגיל קובע איזה זכויות רלוונטיות. נכות כללית מגיל 18 עד גיל פרישה.',
      type:'age',
    },
    {
      id:'severity',
      eyebrow:'שלב 3',
      title:'מהי רמת התלות בעזרת אדם אחר?',
      help:'בפעולות יומיומיות בסיסיות (לבישה, אכילה, רחצה, ניידות בבית, השגחה).',
      type:'select',
      options:[
        {v:'full', icon:'🔴', label:'תלות מלאה ברוב היום', desc:'זכאות שר"מ ברמת 235% (7,872 ₪)'},
        {v:'high', icon:'🟠', label:'תלות מורחבת', desc:'זכאות שר"מ ברמת 188% (6,194 ₪)'},
        {v:'medium', icon:'🟡', label:'תלות בינונית', desc:'זכאות שר"מ ברמת 112% (3,882 ₪)'},
        {v:'partial', icon:'🟢', label:'תלות חלקית', desc:'זכאות שר"מ ברמת 50% (1,676 ₪)'},
        {v:'minimal', icon:'⚪', label:'בעיקר עצמאי', desc:'בעיקר השגחה והכוונה'},
      ]
    },
    {
      id:'mobility',
      eyebrow:'שלב 4',
      title:'האם יש קושי בניידות?',
      help:'הליכה, שימוש ברכב, יציאה מהבית. רלוונטי לקצבת ניידות.',
      type:'select',
      options:[
        {v:'wheelchair', icon:'♿', label:'כיסא גלגלים', desc:'משתמש בכיסא גלגלים באופן קבוע'},

        if(a.age >= 18 && a.age <= 55) s+=40;
        if(a.work==='partial'||a.work==='reduced') s+=30;
        if(a.work==='cannot') s+=20;
        return s;
      },
      getAmount: () => 'מימון לימודים',
      monthly: () => 1000
    },
    {
      id:'sheltered-work',
      cat:'shamam',
      name:'מסגרת תעסוקה מוגנת / מע"ש',
      icon:'🏭',
      desc:'מסגרת תעסוקה תומכת לנכים שאינם יכולים לעבוד בשוק הפתוח. במימון משרד הרווחה.',
      steps:[
        'פנייה ללשכת הרווחה ברשות',
        'הערכה של עו"ס',
        'השמה במסגרת מתאימה',
      ],
      score: a => {
        let s = 0;
        if(a.work==='sheltered') return 85;
        if(a.work==='cannot'||a.work==='never') s+=50;
        if(a.disability==='developmental'||a.disability==='mental') s+=25;
        return s;
      },
      getAmount: () => 'מסגרת מסובסדת',
      monthly: () => 2500
    },
    {
      id:'respite',
      cat:'shamam',
      name:'נופשונים ופנאי',
      icon:'🌴',
      desc:'מסגרות פנאי, ימי נופשון ואירוח. במימון משרד הרווחה / עזר מציון.',
      steps:[
        'פנייה ללשכת הרווחה',
        'הערכה של עו"ס',
        'אישור סל פעילויות',
      ],
      score: a => {
        let s = 0;
        if(a.severity==='full'||a.severity==='high') s+=45;
        if(a.disability==='developmental'||a.disability==='multiple') s+=25;
        return s;
      },
      getAmount: () => 'מימון מלא / חלקי',
      monthly: () => 700
    },
  ];

  const CATS = {
    disability: {title:'נכות / תאונות עבודה', icon:'🧑‍⚖️', desc:'קצבת נכות כללית, נפגעי עבודה, נפגעי צה"ל'},
    shamam:     {title:'שירותים מיוחדים — תלות בזולת', icon:'🤲', desc:'קצבת שר"מ, שיקום, תעסוקה מוגנת, נופשון'},
    mobility:   {title:'ניידות ורכב', icon:'🚗', desc:'קצבת ניידות, רכב מותאם, תג נכה, התאמות'},
    benefits:   {title:'הטבות והליכים', icon:'💵', desc:'מס, ארנונה, חשמל, מים, דיור, אפוטרופסות'},
  };

  const router = (() => { try { return JSON.parse(sessionStorage.getItem('routerData')||'{}'); } catch(e){ return {}; }})();
  const initAge = (router.age && router.age >= 18 && router.age < 67) ? router.age : 25;
  const state = { step:0, answers: (router.age && router.age >= 18 && router.age < 67) ? { age: router.age } : {}, age: initAge };

  // אם הגיל כבר נשלח מהראוטר — מדלגת על שאלת הגיל לחלוטין + מרעננת את מספור השלבים
  if(state.answers.age){
    const ageIdx = QUESTIONS.findIndex(q => q.id === 'age');
    if(ageIdx >= 0) QUESTIONS.splice(ageIdx, 1);
  }
  QUESTIONS.forEach((q,i) => { q.eyebrow = `שלב ${i+1}`; });
  const app = document.getElementById('app');

  function render(){
    if(state.step >= QUESTIONS.length){ renderResults(); return; }
    const q = QUESTIONS[state.step];
    const total = QUESTIONS.length;
    const current = state.step + 1;
    const percent = Math.round(((state.step) / total) * 100);

    let optionsHTML = '';
    if(q.type === 'select'){
      const cols = q.cols === 2 ? 'cols-2' : '';
      optionsHTML = `
        <div class="options ${cols}">
          ${q.options.map(o => `
            <button class="option ${state.answers[q.id]===o.v ? 'selected' : ''}" data-value="${o.v}">
              <div class="check"></div>
              ${o.icon ? `<div class="opt-icon">${o.icon}</div>` : ''}
              <div class="opt-label">
                <strong>${o.label}</strong>
                ${o.desc ? `<span>${o.desc}</span>` : ''}
              </div>
            </button>
          `).join('')}
        </div>`;
    } else if(q.type === 'age'){
      optionsHTML = `
        <div class="age-input">
          <button class="age-btn" id="ageMinus" aria-label="פחות">−</button>
          <div class="age-display">
            <span id="ageVal">${state.age}</span>
            <small>${state.age === 1 ? 'שנה' : 'שנים'}</small>
          </div>
          <button class="age-btn" id="agePlus" aria-label="יותר">+</button>
        </div>`;
    }

    const canNext = q.type === 'age' || state.answers[q.id] !== undefined;

    const introHTML = state.step === 0 ? `
      <div class="intro-banner">
        <h2>📋 הבדיקה בודקת זכאות ב-4 תחומים</h2>
        <p>אחרי 7 שאלות קצרות, נציג לך את הזכויות הרלוונטיות מסודרות לפי תחום:</p>
        <div class="intro-cats">
          ${Object.entries(CATS).map(([k,c]) => `
            <div class="intro-cat"><span class="ic-emoji">${c.icon}</span><span>${c.title}</span></div>
          `).join('')}
        </div>
      </div>` : '';

    app.innerHTML = `
      ${introHTML}
      <div class="progress-wrap">
        <div class="progress-info">
          <span class="step-num">שלב ${current} מתוך ${total}</span>
          <span class="step-percent">${percent}% הושלם</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
      </div>

      <div class="card">
        <div class="question-eyebrow">${q.eyebrow}</div>
        <h2 class="question-title">${q.title}</h2>
        ${q.help ? `<p class="question-help">${q.help}</p>` : ''}
        ${optionsHTML}
        <div class="actions">
          ${state.step > 0 ? '<button class="btn btn-ghost" id="backBtn">→ חזור</button>' : ''}
          <button class="btn btn-primary" id="nextBtn" ${!canNext ? 'disabled' : ''}>
            ${current === total ? 'הצג תוצאות ←' : 'המשך ←'}
          </button>
        </div>
      </div>

      <p class="disclaimer">
        🔒 הבדיקה אנונימית · ללא רישום · התשובה מבוססת על אינדיקציה כללית ואינה מחליפה ייעוץ מקצועי. הסכומים עדכניים ל-1.1.2026.
      </p>`;

    if(q.type === 'select'){
      app.querySelectorAll('.option').forEach(btn => {
        btn.addEventListener('click', () => { state.answers[q.id] = btn.dataset.value; render(); });
      });
    } else if(q.type === 'age'){
      const minus = document.getElementById('ageMinus');
      const plus = document.getElementById('agePlus');
      const val = document.getElementById('ageVal');
      const updateAge = () => {
        val.textContent = state.age;
        val.nextElementSibling.textContent = state.age === 1 ? 'שנה' : 'שנים';
        minus.disabled = state.age <= 18;
        plus.disabled = state.age >= 90;
        state.answers.age = state.age;
      };
      updateAge();
      minus.addEventListener('click', () => { if(state.age > 18){ state.age--; updateAge(); }});
      plus.addEventListener('click', () => { if(state.age < 90){ state.age++; updateAge(); }});
      state.answers.age = state.age;
    }

    const next = document.getElementById('nextBtn');
    if(next) next.addEventListener('click', () => {
      if(q.type === 'age') state.answers.age = state.age;
      state.step++;
      render();
      window.scrollTo({top:0, behavior:'smooth'});
    });
    const back = document.getElementById('backBtn');
    if(back) back.addEventListener('click', () => {
      state.step--;
      render();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  }

  function renderResults(){
    const a = {...state.answers, age: state.age};
    const scored = RIGHTS.map(r => ({
      ...r,
      score: Math.min(100, Math.max(0, r.score(a))),
      computedAmount: r.getAmount ? r.getAmount(a) : null,
      computedMonthly: r.monthly ? (r.monthly(a) || 0) : 0,
    })).sort((x,y) => y.score - x.score);

    const high = scored.filter(r => r.score >= 60);
    const medium = scored.filter(r => r.score >= 35 && r.score < 60);
    const low = scored.filter(r => r.score < 35 && r.score > 0);
    const relevant = [...high, ...medium];
    const totalMonthly = relevant.reduce((sum, r) => sum + r.computedMonthly, 0);
    const totalAnnual = totalMonthly * 12;
    const fmt = n => n.toLocaleString('he-IL');

    const disabilityLabels = {
      physical:'לקות פיזית', developmental:'לקות התפתחותית', sensory:'לקות חושית',
      medical:'מצב רפואי', mental:'מצב נפשי', multiple:'לקויות משולבות'
    };
    const summary = `היי, סיימתי את בודק הזכאות לבוגרים.%0Aסוג לקות: ${disabilityLabels[a.disability]||'-'}%0Aגיל: ${a.age}%0Aזכויות שנמצאו: ${high.length} גבוהה / ${medium.length} בינונית.%0Aהערכת שווי כספי: ~${fmt(totalMonthly)} ₪/חודש (≈ ${fmt(totalAnnual)} ₪/שנה).%0Aמבקש/ת ליווי מקצועי.`;
    const wa = `https://api.whatsapp.com/send?phone=97225023456&text=${summary}`;

    app.innerHTML = `
      <div class="results-header">
        <span class="results-badge">הבדיקה הסתיימה</span>
        <h1 class="results-title">מצאנו <em>${relevant.length} זכויות</em> רלוונטיות</h1>
        <p class="results-sub">להלן הקצבאות וההטבות שיש סיכוי טוב לקבל. כל זכות מצריכה הליך מסודר — ואנחנו כאן לעזור.</p>
      </div>

      <div style="background:linear-gradient(135deg,var(--green),#1e6a45);color:#fff;border-radius:var(--radius-lg);padding:24px;margin-bottom:24px;text-align:center;box-shadow:var(--shadow-md);position:relative;overflow:hidden">
        <div style="position:absolute;top:-30%;right:-20%;width:60%;height:200%;background:radial-gradient(circle,rgba(245,197,54,.25),transparent 60%);pointer-events:none"></div>
        <div style="position:relative">
          <span style="display:inline-block;background:rgba(255,255,255,.2);padding:5px 14px;border-radius:999px;font-size:.78rem;font-weight:700;letter-spacing:.05em;margin-bottom:10px">💰 הערכת שווי כספי</span>
          <h3 style="font-family:'Rubik',sans-serif;font-weight:900;font-size:clamp(1.5rem,5vw,2.2rem);margin-bottom:6px;color:#fff">~ ${fmt(totalMonthly)} ₪ / חודש</h3>
          <p style="color:rgba(255,255,255,.95);font-size:1rem;margin-bottom:14px">≈ <strong style="color:var(--brand-yellow);font-size:1.15rem">${fmt(totalAnnual)} ₪ בשנה</strong></p>
          <p style="font-size:.78rem;color:rgba(255,255,255,.8);line-height:1.5">סכום משוערך של כלל הזכויות הרלוונטיות (קצבאות + שווי הטבות). <strong style="color:var(--brand-yellow)">אומדן בלבד · ט.ל.ח</strong> · הסכום בפועל תלוי באישור הגופים המוסמכים.</p>
        </div>
      </div>

      <div class="summary">
        <div class="summary-card high"><strong>${high.length}</strong><span>סיכוי גבוה</span></div>
        <div class="summary-card medium"><strong>${medium.length}</strong><span>סיכוי בינוני</span></div>
        <div class="summary-card low"><strong>${low.length}</strong><span>נוספות לבדיקה</span></div>
      </div>

      <div class="results-list">
        ${Object.entries(CATS).map(([catKey, catMeta]) => {
          const catRights = relevant.filter(r => r.cat === catKey);
          if(catRights.length === 0) return '';
          return `
            <div class="cat-section">
              <div class="cat-header cat-${catKey}">
                <span class="ch-icon">${catMeta.icon}</span>
                <span class="ch-title">${catMeta.title}</span>
                <span class="ch-count">${catRights.length} זכויות</span>
              </div>
              ${catRights.map(r => {
                const cls = r.score >= 60 ? 'high' : 'medium';
                const lbl = r.score >= 60 ? 'סיכוי גבוה' : 'סיכוי בינוני';
                const lblCls = r.score >= 60 ? 'likelihood-high' : 'likelihood-medium';
                return `
                  <article class="result-card ${cls}">
                    <div class="result-head">
                      <div class="result-icon">${r.icon}</div>
                      <div class="result-info">
                        <h3>${r.name}</h3>
                        <span class="result-likelihood ${lblCls}">${lbl} · ${r.score}%</span>
                        ${r.computedAmount ? `<div><span class="result-amount">${r.computedAmount} <small>לחודש/בקשה</small></span></div>` : ''}
                      </div>
                    </div>
                    <p class="result-desc">${r.desc}</p>
                    <div class="result-steps">
                      <strong>שלבי המימוש</strong>
                      <ul>${r.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                    </div>
                  </article>`;
              }).join('')}
            </div>`;
        }).join('')}

        ${low.length ? `
          <details style="margin-top:8px">
            <summary style="cursor:pointer;padding:14px 18px;background:var(--brand-purple-soft);border-radius:var(--radius-md);font-weight:700;color:var(--brand-purple);font-size:.92rem;list-style:none;display:flex;align-items:center;gap:8px">
              <span style="color:var(--brand-orange)">▼</span>
              ראה ${low.length} זכויות נוספות לבדיקה
            </summary>
            <div style="display:grid;gap:14px;margin-top:14px">
              ${low.map(r => `
                <article class="result-card low">
                  <div class="result-head">
                    <div class="result-icon">${r.icon}</div>
                    <div class="result-info">
                      <h3>${r.name}</h3>
                      <span class="result-likelihood likelihood-low">לבדיקה · ${r.score}%</span>
                    </div>
                  </div>
                  <p class="result-desc">${r.desc}</p>
                </article>`).join('')}
            </div>
          </details>` : ''}
      </div>

      <div class="cta-block">
        <h3>רוצים שניקח את זה מכאן?</h3>
        <p>נציג של מימושים יחזור אליכם תוך 24 שעות עם תוכנית פעולה מותאמת אישית — ללא עלות וללא התחייבות.</p>
        <div class="actions">
          <a class="btn btn-primary" href="${wa}" target="_blank" rel="noopener">📱 לקבלת התוצאות בוואטסאפ — ללחוץ כאן</a>
          <a class="btn btn-primary" href="#lead" target="_blank" rel="noopener">✏️ להשארת פרטים כדי שנחזור אליכם — ליחצו כאן</a>
          <button type="button" class="btn btn-ghost" id="restartBtn">בדוק שוב</button>
        </div>
        <p class="disclaimer" style="margin-top:14px">בלחיצה על אחד הכפתורים הנכם מאשרים שקראתם את <a href="#" onclick="event.preventDefault();showLegal('takanon')">התקנון</a> ו<a href="#" onclick="event.preventDefault();showLegal('privacy')">מדיניות הפרטיות</a>, ושהתוצאות הן אומדן בלבד · <strong>ט.ל.ח</strong></p>
      </div>

      <div class="disclaimer-full">
        <strong>⚠️ הבהרה משפטית — חובה לקרוא · ט.ל.ח</strong>
        תוצאות הבדיקה הן <strong>אומדן ראשוני בלבד</strong> המבוסס על מידע כללי. הזכאות בפועל נקבעת אך ורק על ידי הגופים המוסמכים (המוסד לביטוח לאומי, משרדי הממשלה, רשויות מקומיות, קופות חולים) בכפוף לחוקים, תקנות, חוזרי מנכ"ל, ועדות רפואיות, מסמכים, אבחונים ובדיקות. הסכומים והתעריפים עדכניים לפי לוח המוסד לביטוח לאומי לשנת 2026 ועשויים להשתנות ללא הודעה.
        <br><br>
        השימוש בכלי <strong>אינו מהווה ייעוץ משפטי, רפואי, סוציאלי או מקצועי</strong>, אינו יוצר יחסי לקוח-נותן שירות, ואינו תחליף לייעוץ פרטני. החברה, בעליה ומפעיליה <strong>לא יישאו באחריות</strong> לכל נזק ישיר/עקיף שייגרם משימוש או הסתמכות על המידע, לרבות אי-קבלת זכאות, פספוס מועדים או החלטות הגופים. אנו ממליצים לאמת מידע מול המוסד לביטוח לאומי (8809*) ו-btl.gov.il.
      </div>

      <p class="disclaimer">🔒 הבדיקה אנונימית · התוצאות לא נשמרו · הסכומים עדכניים ל-1.1.2026</p>`;

    // לידים מטופלים דרך window.LEAD_URL (מוגדר בסוף הקובץ). הוואטסאפ נבנה ישירות עם summary.
    document.querySelectorAll('a[href="#lead"]').forEach(a => { if(window.LEAD_URL) a.href = window.LEAD_URL; });
    window.showLegal = function(key){ document.getElementById('legalModal').style.display='flex'; document.getElementById('legalTitle').textContent = key==='takanon'?'תקנון':key==='privacy'?'מדיניות פרטיות':'הצהרת נגישות'; document.getElementById('legalBody').innerHTML = window.LEGAL_TEXTS[key]; };

    document.getElementById('restartBtn').addEventListener('click', () => {
      state.step = 0; state.answers = {}; state.age = 25;
      render(); window.scrollTo({top:0, behavior:'smooth'});
    });
  }

  render();
</script>

(function(){
  const fab=document.getElementById('a11yFab'),panel=document.getElementById('a11yPanel'),close=document.getElementById('a11yClose'),reset=document.getElementById('a11yReset');
  const TOGGLES=['contrast','dark','mono','links','readable','spacing','noanim','bigcursor'];
  const FONT_SIZES=['normal','lg','xl'];
  function apply(){const s=JSON.parse(localStorage.getItem('a11y')||'{}');TOGGLES.forEach(t=>document.body.classList.toggle('a11y-'+t,!!s[t]));FONT_SIZES.forEach(f=>document.body.classList.toggle('a11y-font-'+f,s.font===f));document.querySelectorAll('.a11y-btn').forEach(b=>{const t=b.dataset.toggle,v=b.dataset.val;if(t==='font')b.classList.toggle('active',s.font===v||(!s.font&&v==='normal'));else b.classList.toggle('active',!!s[t]);});}
  fab.addEventListener('click',()=>panel.classList.add('open'));
  close.addEventListener('click',()=>panel.classList.remove('open'));
  document.addEventListener('keydown',e=>{if(e.key==='Escape')panel.classList.remove('open');});
  document.querySelectorAll('.a11y-btn').forEach(b=>b.addEventListener('click',()=>{const s=JSON.parse(localStorage.getItem('a11y')||'{}');const t=b.dataset.toggle,v=b.dataset.val;if(t==='font')s.font=v;else s[t]=!s[t];localStorage.setItem('a11y',JSON.stringify(s));apply();}));
  reset.addEventListener('click',()=>{localStorage.removeItem('a11y');apply();});

})();
